name: Package Release

# Builds and releases Aile.
# Tag format: Aile_{version}_{yyyyMMdd}

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string (e.g. 1.0.0). Leave empty to use git describe'
        required: false
        default: ''
      date:
        description: 'Date for tag (yyyyMMdd). Leave empty to use today'
        required: false
        default: ''
      prerelease:
        description: 'Mark as pre-release'
        type: boolean
        required: false
        default: false

jobs:
  build:
    runs-on: windows-latest
    outputs:
      aile_tag: ${{ steps.names.outputs.aile_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up MSVC x64
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure CMake
        run: >
          cmake -B build_release -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_C_COMPILER=cl
          -DCMAKE_CXX_COMPILER=cl

      - name: Build
        run: cmake --build build_release

      - name: Set up MSVC x86
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86

      - name: Configure CMake (x86)
        run: >
          cmake -B build_release_x86 -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_C_COMPILER=cl
          -DCMAKE_CXX_COMPILER=cl

      - name: Build 32-bit shell extensions
        run: cmake --build build_release_x86 --target AileShell

      - name: Configure CMake AileSetup
        run: >
          cmake -B build_release_setup -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_C_COMPILER=cl
          -DCMAKE_CXX_COMPILER=cl

      - name: Build AileSetup
        run: cmake --build build_release_setup --target AileSetup

      - name: Compute tag names
        id: names
        shell: pwsh
        run: |
          $input_ver = "${{ inputs.version }}"
          if ($input_ver -ne "") {
            $ver = $input_ver
          } else {
            $ver = git describe --tags --always 2>$null
            if (-not $ver) { $ver = "dev" }
          }
          $input_date = "${{ inputs.date }}"
          $d = if ($input_date -ne "") { $input_date } else { (Get-Date).ToString("yyyyMMdd") }
          "aile_tag=Aile_${ver}_${d}" | Out-File $env:GITHUB_OUTPUT -Append

      - name: Package Aile
        shell: pwsh
        run: |
          $tag = "${{ steps.names.outputs.aile_tag }}"
          New-Item -ItemType Directory -Force pkg_aile\bin | Out-Null
          Copy-Item build_release\Aile.exe pkg_aile\Aile.exe
          Copy-Item README.md               pkg_aile\README.md
          Copy-Item -Recurse b2e            pkg_aile\b2e
          $vendor = "third_party\7zip-zstd"
          Copy-Item $vendor\7z.dll      pkg_aile\bin\7z.dll
          Copy-Item $vendor\7z.sfx      pkg_aile\bin\7z.sfx
          Copy-Item $vendor\7zCon.sfx   pkg_aile\bin\7zCon.sfx
          Copy-Item $vendor\License.txt pkg_aile\bin\License.txt
          Copy-Item build_release\AileShell.dll        pkg_aile\AileShell.dll
          Copy-Item build_release_x86\AileShell32.dll        pkg_aile\AileShell32.dll
          Copy-Item build_release_setup\ailesetup\AileSetup.exe pkg_aile\AileSetup.exe
          Compress-Archive -Path pkg_aile\* -DestinationPath "${tag}.zip"
          Write-Host "Created: ${tag}.zip ($([Math]::Round((Get-Item "${tag}.zip").Length/1KB)) KB)"

      - name: Upload Aile artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.names.outputs.aile_tag }}
          path: ${{ steps.names.outputs.aile_tag }}.zip

  release-aile:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.aile_tag }}
          path: dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.aile_tag }}
          name: ${{ needs.build.outputs.aile_tag }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          body: |
            ## Aile

            Built from commit ${{ github.sha }} (`${{ github.ref_name }}`)

            ### Package contents

            | File | Description |
            |---|---|
            | `Aile.exe`           | Executable (MSVC x64 Release) |
            | `README.md`            | Overview and usage |
            | `b2e/`                 | B2E archive handler scripts |
            | `AileShell.dll`         | Explorer right-click menu handler (64-bit hosts) |
            | `AileShell32.dll`       | Explorer right-click menu handler (32-bit hosts) |
            | `AileSetup.exe`           | GUI Setup Tool to register/unregister shell extensions |
            | `bin\7z.dll`           | Native 7z Engine |
            | `bin\7z.sfx`           | SFX stub (Desktop) |
            | `bin\7zCon.sfx`        | SFX stub (console) |
            | `bin\License.txt`      | 7-Zip license |
          files: dist/${{ needs.build.outputs.aile_tag }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
